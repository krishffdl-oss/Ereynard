<!doctype html>
<html lang="en">
  <head>
    <!--
      TAG ORDER (matched to SEO extension priority):
      1. charset (100)        — MUST be first, within first 1024 bytes
      2. viewport (100)       — MUST be second
      3. theme-color
      4. title (95)           — before any scripts/styles
      5. preconnects (90)     — early network hints
      6. favicons
      7. preloads (30-40)     — after high-priority meta
      8. critical inline CSS (40)
      9. non-blocking fonts
      10. GTM (async, at end of head) — keeps it off the critical path
    -->

    <!-- 1. charset — ABSOLUTE FIRST -->
    <meta charset="UTF-8" />

    <!-- 2. viewport — SECOND -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 3. theme-color -->
    <meta name="theme-color" content="#f0c845" />

    <!-- 4. title — before any script or style -->
    <title>Ereynard Digital — Smart like a fox. Sharp in digital.</title>

    <!-- 5. Preconnects (priority 90) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- 6. Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/web-app-manifest-192x192.png" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />

    <!-- 7. Preloads — LCP hero image + logo -->
    <link
      rel="preload"
      as="image"
      href="https://images.unsplash.com/photo-1497366216548-37526070297c?w=1280&auto=format&fit=crop&q=65"
      fetchpriority="high"
    />
    <link rel="preload" as="image" href="/logo.jpg" />

    <!-- 8. Critical inline CSS -->
    <style>
      *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
      html{scroll-behavior:smooth;}
      body{background:#080930;color:#f0c845;overflow-x:hidden;}
      #root{min-height:100vh;}
    </style>

    <!-- 9. Non-blocking fonts -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Playfair+Display:ital@1&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Playfair+Display:ital@1&display=swap" />
    </noscript>

    <!-- 10. GTM — async at END of head, never blocks rendering -->
    <script>
      (function(w,d,s,l,i){
        w[l]=w[l]||[];
        w[l].push({'gtm.start': new Date().getTime(), event:'gtm.js'});
        var f=d.getElementsByTagName(s)[0],
            j=d.createElement(s),
            dl=l!='dataLayer'?'&l='+l:'';
        j.async=true;
        j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;
        f.parentNode.insertBefore(j,f);
      })(window,document,'script','dataLayer','GTM-P3QMKHFC');
    </script>
  </head>
  <body>
    <!-- GTM noscript fallback -->
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-P3QMKHFC"
        height="0" width="0"
        style="display:none;visibility:hidden"
      ></iframe>
    </noscript>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
